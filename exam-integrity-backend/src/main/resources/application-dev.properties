# Server
server.port=${SERVER_PORT:8090}
exam.integrity.service.name=exam-integrity-backend

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.livereload.enabled=true

# MongoDB (all persistent data: exams, sessions, scores, audit_events)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/exam_integrity?directConnection=true&serverSelectionTimeoutMS=2000}
spring.data.mongodb.auto-index-creation=true

# Redis (timer state)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Python ingestion service URL
ingestion.service.base-url=${INGESTION_SERVICE_URL:http://localhost:8091}

# Swagger UI enabled for dev
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
